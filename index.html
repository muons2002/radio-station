<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0f171e; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: white; font-family: sans-serif; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 35px; }
        
        .clock-wrapper { position: relative; width: 150px; height: 150px; display: flex; align-items: center; justify-content: center; }
        
        #halo { 
            position: absolute; width: 150px; height: 150px; border-radius: 50%; 
            background: radial-gradient(circle, rgba(79, 195, 247, 0.4), transparent); 
            z-index: 0; pointer-events: none; transition: transform 0.08s ease-out; 
        }
        
        .clock-container { width: 150px; height: 150px; background: #1a2936; border-radius: 50%; position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; }
        
        .center-dot { position: absolute; width: 10px; height: 10px; background: #fff; border-radius: 50%; z-index: 2; box-shadow: 0 0 5px #fff; }
        
        .neon-text { font-size: 1.2rem; font-weight: bold; color: #4fc3f7; text-shadow: 0 0 10px #4fc3f7; margin-top: 10px; letter-spacing: 2px; }
        
        .num { position: absolute; font-size: 0.9rem; font-weight: bold; color: #4fc3f7; }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; background: white; border-radius: 5px; }
        #hour { height: 35px; width: 4px; margin-left: -2px; }
        #min { height: 50px; width: 3px; margin-left: -1.5px; }
        #sec { height: 55px; width: 2px; margin-left: -1px; background: #ff5252; }
        
        #btn { padding: 12px 24px; background: #4fc3f7; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: #0f171e; z-index: 3; }
    </style>
</head>
<body>

<div class="container">
    <div class="clock-wrapper">
        <div id="halo"></div>
        <div class="clock-container">
            <div class="center-dot"></div>
            <script>
                for(let i=1; i<=12; i++) {
                    let angle = (i * 30) * (Math.PI / 180);
                    let x = 60 * Math.sin(angle);
                    let y = -60 * Math.cos(angle);
                    document.write(`<div class="num" style="transform:translate(${x}px, ${y}px)">${i}</div>`);
                }
            </script>
            <div class="hand" id="hour"></div>
            <div class="hand" id="min"></div>
            <div class="hand" id="sec"></div>
        </div>
    </div>
    
    <div class="neon-text">جنود الخفاء</div>
    <button id="btn" onclick="toggleRadio()">تشغيل الإذاعة</button>
    <audio id="audio" src="https://stream.radiojar.com/8s5u5tpdtwzuv" crossorigin="anonymous"></audio>
</div>

<script>
    let isPlaying = false;
    const audio = document.getElementById('audio');
    const btn = document.getElementById('btn');
    const halo = document.getElementById('halo');
    let audioCtx, analyser;

    // تشغيل الساعة بشكل مستقل ومستمر
    function updateClock() {
        const now = new Date();
        document.getElementById('sec').style.transform = `rotate(${now.getSeconds() * 6}deg)`;
        document.getElementById('min').style.transform = `rotate(${now.getMinutes() * 6}deg)`;
        document.getElementById('hour').style.transform = `rotate(${(now.getHours() % 12) * 30 + now.getMinutes() * 0.5}deg)`;
        requestAnimationFrame(updateClock);
    }
    updateClock();

    function toggleRadio() {
        if (!isPlaying) {
            audio.play();
            btn.innerText = "إيقاف الإذاعة";
            isPlaying = true;
            startVisualizer();
        } else {
            audio.pause();
            btn.innerText = "تشغيل الإذاعة";
            isPlaying = false;
            halo.style.transform = "scale(1)"; 
        }
    }

    function startVisualizer() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaElementSource(audio);
            analyser = audioCtx.createAnalyser();
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 64;
        }
        
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        function updateHalo() {
            if (!isPlaying) return;
            analyser.getByteFrequencyData(dataArray);
            let sum = dataArray.reduce((a, b) => a + b);
            let scale = 1 + (sum / 12000); 
            halo.style.transform = `scale(${scale})`;
            requestAnimationFrame(updateHalo);
        }
        updateHalo();
    }
</script>
</body>
</html>
